[manifest]
version = "1.0.0"
dump_lua = true
priority = 1000

# Fix flames not appearing with bignum blind size
[[patches]]
[patches.pattern]
target = '''functions/button_callbacks.lua'''
pattern = '''if to_big(G.ARGS.score_intensity.earned_score) >= to_big(G.ARGS.score_intensity.required_score) and to_big(G.ARGS.score_intensity.required_score) > to_big(0) then'''
position = "at"
payload = '''
	if (type(SMODS.get_scoring_parameter('chips', true)) == 'number' or type(SMODS.get_scoring_parameter('chips', true)) == 'table') and (type(SMODS.get_scoring_parameter('mult', true)) == 'number' or type(SMODS.get_scoring_parameter('mult', true)) == 'table') then
		G.ARGS.score_intensity.true_score = to_big(G.GAME.current_scoring_calculation:func(SMODS.get_scoring_parameter('chips', true), SMODS.get_scoring_parameter('mult', true), true))
	else
		G.ARGS.score_intensity.true_score = to_big(0)
	end
	if to_big(G.ARGS.score_intensity.true_score) >= to_big(G.ARGS.score_intensity.required_score) and to_big(G.ARGS.score_intensity.required_score) > to_big(0) then
'''
match_indent = true

# Cartomancer compat
[[patches]]
[patches.pattern]
target = '''=[SMODS Cartomancer "core/flames.lua"]'''
pattern = '''value = math.max(0., math.log(G.ARGS.score_intensity.earned_score/G.ARGS.score_intensity.required_score + 5, 5))'''
position = "at"
payload = '''
	if (type(SMODS.get_scoring_parameter('chips', true)) == 'number' or type(SMODS.get_scoring_parameter('chips', true)) == 'table') and (type(SMODS.get_scoring_parameter('mult', true)) == 'number' or type(SMODS.get_scoring_parameter('mult', true)) == 'table') then
		G.ARGS.score_intensity.true_score = to_big(G.GAME.current_scoring_calculation:func(SMODS.get_scoring_parameter('chips', true), SMODS.get_scoring_parameter('mult', true), true))
	else
		G.ARGS.score_intensity.true_score = to_big(0)
	end
	value = math.min(1e300, math.max(0., math.log(G.ARGS.score_intensity.true_score/G.ARGS.score_intensity.required_score + 5, 5)))
'''
match_indent = true