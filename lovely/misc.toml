# Disable displays if necessary to prevent crashing
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "G.GAME.blind:load(saveTable.BLIND)"
position = "after"
payload = '''
	if #(G.GAME.may_displays or {}) ~= 0 then
        G.E_MANAGER:add_event(Event({func = function()
		    for k, v in pairs(G.GAME.may_displays) do
				v = nil
		    end 
		    G.GAME.may_displays = {}
		return true end})) 
	end
	if #(G.play.cards or {}) ~= 0 then 
	    G.E_MANAGER:add_event(Event({func = function()
		    for k, v in pairs(G.play.cards) do
			    if v:is_playing_card() then 
				    draw_card(v.area, G.discard, 1, 'up', true, v, nil, true)
				elseif v:gc().set == 'Joker' then
				    v.area:remove_card(v)
				    G.jokers:emplace(v)
				elseif v.ability.consumeable or v:gc().set == 'Voucher' then
				    v.area:remove_card(v)
				    G.consumeables:emplace(v)
				else
				    v:remove()
			    end
		    end 
		return true end}))
	end
	may.ch()
	may.refresh_score_operator(nil, true)
	if may.conf.TrParticles then
        G.transcendence_particles = Particles(1, 1, 0, 0, {
            timer = 0.015,
            scale = 0.3,
            initialize = true,
            lifespan = 3,
            speed = 5,
            padding = -1,
            attach = G.ROOM_ATTACH,
            colours = { G.C.BLACK, G.C.DARK_EDITION },
            fill = true
        })
        G.transcendence_particles.fade_alpha = 1
	end
'''
match_indent = true

