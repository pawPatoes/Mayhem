# Misc Poker Hand values
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''G.GAME.hands[text].visible = true'''
position = "after"
payload = '''
	if G.GAME.hands[text].dollars then
		ease_dollars(G.GAME.hands[text].dollars)
	end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''-- context.after calculations'''
position = "before"
payload = '''
	if text then
		if G.GAME.hands[text].score then
			G.E_MANAGER:add_event(Event({trigger = 'after', delay = 0.3, func = function() 
				G.GAME.chips = to_big(G.GAME.chips):add(G.GAME.hands[text].score)
				G.HUD:get_UIE_by_ID('chip_UI_count'):juice_up(0.3, 0.3)
				play_sound('may_addscore')
			return true end}))
		end
	end
	if to_big(G.GAME.chips) >= to_big(G.GAME.blind.chips) * 1e100 then
	    G.GAME.may_tr1_reached = true 
	end
'''
match_indent = true

# Failsafe
[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = "G.GAME.hands[hand].level = math.max(0, G.GAME.hands[hand].level + amount)"
position = "at"
payload = '''G.GAME.hands[hand or 'High Card'].level = math.max(0, to_big(G.GAME.hands[hand or 'High Card'].level) + to_big(amount))'''
match_indent = true