target = "functions/common_events.lua"
pattern = '''G.hand_text_area.hand_level.config.colour = G.C.HAND_LEVELS[math.floor(to_number(math.min(vals.level, 7)))]'''
position = "at"
payload = '''G.hand_text_area.hand_level.config.colour = G.C.HAND_LEVELS[math.floor(to_number(math.min(vals.level, G.C.MAX_HAND_LEVEL_COLOR)))]'''
match_indent = true
overwrite = true

