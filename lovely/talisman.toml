[manifest]
version = "1.0.0"
dump_lua = true
priority = 1000000000

# Custom hyperoperation effects

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''elseif eval_type == 'hyper_chips' then
	sound = 'talisman_eeechip''''
position = "at"
payload = '''
elseif eval_type == 'hyper_chips' then
    amt[1] = math.max(amt[1], -3)
	sound = may.get_operation_sound(amt[1], 'chips')
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''elseif eval_type == 'hyper_mult' then
	sound = 'talisman_eeemult''''
position = "at"
payload = '''
elseif eval_type == 'hyper_mult' then
    amt[1] = math.max(amt[1], -3)
	sound = may.get_operation_sound(amt[1], 'mult')
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''(extra.EEEchip_mod or extra.hyperchip_mod) and 'talisman_eeechip' or'''
position = "at"
payload = '''extra.EEEchip_mod and 'talisman_eeechip' or
extra.EEEmult_mod and 'talisman_eeemult' or
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''(extra.EEEmult_mod or extra.hypermult_mod) and 'talisman_eeemult' or'''
position = "at"
payload = '''
extra.hyperchip_mod and may.get_operation_sound(amt[1], 'chips') or
extra.hypermult_mod and may.get_operation_sound(amt[1], 'mult') or
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '''=[SMODS Amulet "talisman/effects.lua"]'''
pattern = '''sound = init.soundFormat and init.soundFormat:format('eee'),'''
position = "at"
payload = '''sound = may.get_operation_sound(i, init and init.keyPlural or 'chips'),'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''if type(hyper_mult) == 'table' and hyper_mult[1] > 0 and hyper_mult[2] > 0 then'''
position = "at"
payload = '''if type(hyper_mult) == 'table' and hyper_mult[1] >= -4 and hyper_mult[2] > 0 then'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''if type(hyper_chips) == 'table' and hyper_chips[1] > 0 and hyper_chips[2] > 0 then'''
position = "at"
payload = '''if type(hyper_chips) == 'table' and hyper_chips[1] >= -4 and hyper_chips[2] > 0 then'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''sound = h.sound'''
position = "at"
payload = '''sound = eval_type == 'hyper_mult' and may.get_operation_sound(amt[1], 'mult') or eval_type == 'hyper_chips' and may.get_operation_sound(amt[1], 'chips') or h.sound'''
match_indent = true

