[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Allow title screen card to have an edition
[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = "if args.type == 'have_edition' then"
position = "at"
payload = '''if args.type == 'have_edition' and G.jokers then'''
match_indent = true

# Apply enhancement to base title screen card 
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "replace_card.states.visible = false"
position = "before"
payload = '''
	if may.conf.Menu then
		if may.mode == 1 then
			replace_card:set_ability(G.P_CENTERS.m_mult, true, true)
		else
			replace_card:set_ability(G.P_CENTERS.m_may_super_mult, true, true)
		end
	end
'''
match_indent = true
overwrite = false

# Title card
# Taken from Maximus 
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''if self.SPLASH_LOGO then self.SPLASH_LOGO:remove(); self.SPLASH_LOGO = nil end'''
position = "after"
payload = '''if self.may_titlecard then self.may_titlecard:remove(); self.may_titlecard = nil end'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''
if G.SPLASH_LOGO then
    love.graphics.push()
    G.SPLASH_LOGO:translate_container()
    G.SPLASH_LOGO:draw()
    love.graphics.pop()
end
'''
position = "after"
payload = '''
if G.may_titlecard then
    love.graphics.push()
    G.may_titlecard:translate_container()
    if not G.may_titlecard.states.drag.is then
        local scale_mod = math.cos(G.TIMERS.REAL * 0.8) * 0.035
        local rotate_mod = -(math.sin(G.TIMERS.REAL) * 0.05)

        G.may_titlecard:draw_shader('dissolve',0, nil, nil, G.may_titlecard,scale_mod, rotate_mod,nil, 0.1 + 0.08*math.sin(1.3*G.TIMERS.REAL),nil, 0.6)
        G.may_titlecard:draw_shader('dissolve', nil, nil, nil, G.may_titlecard, scale_mod, rotate_mod)
    end
    add_to_drawhash(G.may_titlecard)
    love.graphics.pop() 
end
'''
match_indent = true
times = 1