	may_mass_use_ambiance = {volfunc = function(_prev_volume) return _prev_volume*(1 - dt) + dt*0.6*(G.SETTINGS.SOUND.game_sounds_volume + 100)/200*((math.min((G.ROOM.MassUseIndex or 0) * 0.05, 100) * 1.3)) end},
	-- the rest of the transcendences are handled as a music tracks so they can replace the main theme
'''
match_indent = true

