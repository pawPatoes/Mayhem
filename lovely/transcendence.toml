            initialize = true,
            lifespan = 3,
            speed = 5,
            padding = -1,
            attach = G.ROOM_ATTACH,
            colours = { G.C.BLACK, G.C.DARK_EDITION },
            fill = true
        })
        G.transcendence_particles.fade_alpha = 1
        G.transcendence_particles:fade(0, 1)
	end
'''
