on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull from Codeberg
        run: |
          git remote add codeberg https://codeberg.org/BalatroMayhem/Mayhem.git
          git fetch codeberg
          git checkout -b sync-from-codeberg
          git reset --hard codeberg/main

      - name: Push branch to GitHub
        run: |
          git push origin sync-from-codeberg --force

      - name: Create Pull Request
        run: |
          # Create a temporary directory for gh config
          mkdir -p .gh_config
          export GH_CONFIG_DIR=$(pwd)/.gh_config
          
          # Force authentication using PAT
          echo "${{ secrets.MY_PAT }}" | gh auth login --with-token
          
          # Create the PR explicitly bypassing any global/env tokens
          gh pr create \
            --title "PULL THE REQUEST (Update mod)" \
            --body "WE PULL THE REUQESTS HERE" \
            --head sync-from-codeberg \
            --base main
