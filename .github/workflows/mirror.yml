on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull from Codeberg
        run: |
          git remote add codeberg https://codeberg.org/BalatroMayhem/Mayhem.git
          git fetch codeberg
          git checkout -b sync-from-codeberg
          git reset --hard codeberg/main

      - name: Push branch to GitHub
        run: |
          git push origin sync-from-codeberg --force
      
      - name: Create Pull Request
        env:
            GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git checkout sync-from-codeberg
            mkdir -p .github
            if [ ! -f .github/pr_count.md ]; then
              echo "1" > .github/pr_count.md
            else
              CURRENT=$(cat .github/pr_count.md)
              echo $((CURRENT + 1)) > .github/pr_count.md
            fi
            git add .github/pr_count.md
            git commit -m "Update PR count"
            git push origin sync-from-codeberg
            gh pr create \
              --title "PULL THE REQUEST (Update mod #$(cat .github/pr_count.md))" \
              --body "WE PULL THE REUQESTS HERE. This is pull request number $(cat .github/pr_count.md)." \
              --head sync-from-codeberg \
              --base main
